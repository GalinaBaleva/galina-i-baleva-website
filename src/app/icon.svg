<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
    <linearGradient id="eyes" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
    <linearGradient id="gbText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Outer gradient border ring ── -->
  <rect x="1" y="1" width="62" height="62" rx="15" fill="none"
        stroke="url(#border)" stroke-width="2"/>

  <!-- ── Dark background ── -->
  <rect x="3" y="3" width="58" height="58" rx="13" fill="#05070c"/>

  <!-- ── Antenna stem ── -->
  <rect x="30.5" y="5" width="3" height="8" rx="1.5" fill="#1a2535"/>
  <rect x="30.5" y="5" width="3" height="8" rx="1.5" fill="url(#border)" opacity="0.7"/>

  <!-- ── Antenna tip glow ── -->
  <circle cx="32" cy="4.5" r="3" fill="#00e5ff" filter="url(#softGlow)" opacity="0.5"/>
  <circle cx="32" cy="4.5" r="2" fill="#00e5ff"/>

  <!-- ── Robot head ── -->
  <rect x="9" y="14" width="46" height="40" rx="9" fill="#0a0d18"/>
  <!-- Head inner border subtle -->
  <rect x="9" y="14" width="46" height="40" rx="9" fill="none"
        stroke="url(#border)" stroke-width="0.8" opacity="0.25"/>

  <!-- ── Ear nodes (left) ── -->
  <rect x="5" y="24" width="5" height="10" rx="2.5" fill="#0f1525"/>
  <rect x="5" y="24" width="5" height="10" rx="2.5" fill="none"
        stroke="#00e5ff" stroke-width="0.7" opacity="0.4"/>

  <!-- ── Ear nodes (right) ── -->
  <rect x="54" y="24" width="5" height="10" rx="2.5" fill="#0f1525"/>
  <rect x="54" y="24" width="5" height="10" rx="2.5" fill="none"
        stroke="#7c4dff" stroke-width="0.7" opacity="0.4"/>

  <!-- ── Eyes: glow layer ── -->
  <rect x="13" y="22" width="14" height="7" rx="3.5"
        fill="#00e5ff" opacity="0.15" filter="url(#softGlow)"/>
  <rect x="37" y="22" width="14" height="7" rx="3.5"
        fill="#7c4dff" opacity="0.15" filter="url(#softGlow)"/>

  <!-- ── Eyes: solid ── -->
  <rect x="13" y="22" width="14" height="7" rx="3.5" fill="#00e5ff" filter="url(#glow)"/>
  <rect x="37" y="22" width="14" height="7" rx="3.5" fill="#7c4dff" filter="url(#glow)"/>

  <!-- ── Eye inner shine ── -->
  <rect x="14" y="23" width="6" height="2.5" rx="1.2" fill="white" opacity="0.35"/>
  <rect x="38" y="23" width="6" height="2.5" rx="1.2" fill="white" opacity="0.25"/>

  <!-- ── Mouth / speaker grille ── -->
  <rect x="19" y="37" width="4"  height="2.5" rx="1.2" fill="#1e2d42"/>
  <rect x="25" y="37" width="4"  height="2.5" rx="1.2" fill="#1e2d42"/>
  <rect x="31" y="37" width="4"  height="2.5" rx="1.2" fill="#1e2d42"/>
  <rect x="37" y="37" width="4"  height="2.5" rx="1.2" fill="#1e2d42"/>
  <rect x="43" y="37" width="3"  height="2.5" rx="1.2" fill="#1e2d42"/>

  <!-- ── GB text ── -->
  <text x="32" y="52"
        font-family="'Space Grotesk', 'Arial Black', sans-serif"
        font-size="11"
        font-weight="700"
        fill="url(#gbText)"
        text-anchor="middle"
        letter-spacing="2">GB</text>
</svg>
